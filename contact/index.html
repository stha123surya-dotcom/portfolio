<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
h2 {
    text-align: center;
    margin-bottom: 20px;
}
.input-group {
    margin-bottom: 15px;
}
.input-group input,
.input-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #667eea;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}
button:hover {
    background: #5a67d8;
}
#status {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}
</style>

</head>
<body>

<div class="container">
    <form id="contactForm" action="https://formspree.io/f/meeparzp" method="POST">
        <h2>Contact Us</h2>

        <div class="input-group">
            <input type="text" name="name" id="name" placeholder="Your Name *" required>
        </div>

        <div class="input-group">
            <input type="email" name="email" id="email" placeholder="Your Email *" required>
        </div>

        <div class="input-group">
            <input type="tel" name="mobile" id="mobile" placeholder="Mobile Number *" required>
        </div>

        <div class="input-group">
            <input type="text" name="subject" placeholder="Subject">
        </div>

        <div class="input-group">
            <textarea name="message" rows="5" placeholder="Your Message"></textarea>
        </div>

        <!-- Optional subject line in email -->
        <input type="hidden" name="_subject" value="New Contact Submission">

        <button type="submit">Send Message</button>

        <p id="status"></p>
    </form>
</div>

<script>
const form = document.getElementById("contactForm");
const status = document.getElementById("status");

form.addEventListener("submit", async function(e) {
    e.preventDefault();

    // Validation
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let mobile = document.getElementById("mobile").value.trim();

    if (!name || !email || !mobile) {
        status.style.color = "red";
        status.innerHTML = "Please fill all required fields!";
        return;
    }

    try {
        let response = await fetch(form.action, {
            method: form.method,
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
            status.style.color = "green";
            status.innerHTML = "✅ Message sent successfully!";
            form.reset();
        } else {
            status.style.color = "red";
            status.innerHTML = "❌ Failed to send message!";
        }
    } catch (error) {
        status.style.color = "red";
        status.innerHTML = "⚠️ Network error!";
    }
});
</script>

</body>
</html>
